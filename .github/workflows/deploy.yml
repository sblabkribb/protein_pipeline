name: Deploy Protein Pipeline

on:
  push:
    branches:
      - dev
      - develop
      - staging
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read

concurrency:
  group: protein-pipeline-${{ github.event_name == 'workflow_dispatch' && inputs.environment || startsWith(github.ref, 'refs/tags/v') && 'prod' || github.ref == 'refs/heads/staging' && 'staging' || 'dev' }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r pipeline-mcp/requirements.txt

      - name: Run backend deployment checks
        env:
          PYTHONPATH: pipeline-mcp/src
        run: |
          pytest \
            pipeline-mcp/tests/test_http_server_auth.py \
            pipeline-mcp/tests/test_mcp_http_route.py \
            pipeline-mcp/tests/test_oidc_auth.py \
            pipeline-mcp/tests/test_session_auth.py \
            pipeline-mcp/tests/test_runpod_admin.py

      - name: Run frontend deployment checks
        run: |
          npm --prefix frontend ci
          node --test \
            frontend/tests/app-syntax.test.js \
            frontend/tests/auth-session.test.js \
            frontend/tests/auth.test.js \
            frontend/tests/login-bootstrap.test.js \
            frontend/tests/mcp-tab.test.js \
            frontend/tests/runpod-admin.test.js
          (cd frontend && node --test tests/logout-bridge.test.js)
          npm --prefix frontend run build

  deploy:
    needs: test
    runs-on: [self-hosted, protein-pipeline, deploy]
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'prod' && 'production' || github.event_name == 'workflow_dispatch' && inputs.environment == 'staging' && 'staging' || startsWith(github.ref, 'refs/tags/v') && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'development' }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve deployment target
        id: target
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            target="${{ inputs.environment }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            target="prod"
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            target="staging"
          else
            target="dev"
          fi
          echo "target=${target}" >> "${GITHUB_OUTPUT}"

      - name: Deploy locally
        shell: bash
        env:
          DEPLOY_TARGET: ${{ steps.target.outputs.target }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          bash scripts/deploy/deploy_from_github.sh
